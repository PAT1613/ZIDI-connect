# ZIDI Connect — Production reverse proxy
#
# To deploy on a real host, swap the placeholder `zidi.example.com` below
# (look for `server_name`) for your real FQDN, then reload nginx:
#   docker compose -f docker-compose.prod.yml exec nginx nginx -s reload
#
# TLS certificates are expected at /etc/nginx/certs/{fullchain.pem,privkey.pem}
# (mounted from ./nginx/certs/). Issue them with Certbot using the webroot
# challenge served from /var/www/certbot via the :80 location below.

user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Log format includes upstream timing for ops diagnostics.
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time uct="$upstream_connect_time" '
                    'urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Compression — only text-ish payloads benefit; images are already compressed.
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_comp_level    6;
    gzip_proxied       any;
    gzip_types         text/plain
                       text/css
                       text/xml
                       application/javascript
                       application/json
                       application/xml
                       application/xml+rss
                       image/svg+xml;

    # API rate limit — 20 req/s per client IP, 10 MB shared zone (~160k IPs).
    limit_req_zone $binary_remote_addr zone=apilimit:10m rate=20r/s;

    # Trust Docker's internal network as the only real-IP source.
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header   X-Forwarded-For;

    # Modern, conservative TLS defaults — applied per server below.
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    upstream backend_upstream {
        server backend:8000;
        keepalive 32;
    }

    # ----- HTTP :80 — ACME + redirect everything else to HTTPS -----
    server {
        listen      80;
        listen      [::]:80;
        server_name zidi.example.com;

        # Certbot webroot challenge — must stay on plain HTTP.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----- HTTPS :443 — the real application -----
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name zidi.example.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Hard cap on request body to stop pathological uploads (PDF/Excel exports
        # are server-generated; the largest legitimate inbound is avatar/CSV).
        client_max_body_size 25M;

        # Security headers.
        # HSTS: lock browsers to HTTPS for 1 year incl. subdomains. Only safe once
        # the cert is verified working — comment out during initial cert issuance.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;
        # CSP: SPA served from self, API on same origin. `unsafe-inline` on styles
        # is required by Tailwind's runtime utility classes and inline <style> from
        # Vite's CSS injection in dev-mode builds.
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # Common proxy headers — reused by every proxy_pass below.
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # ----- API -----
        location /api/ {
            limit_req       zone=apilimit burst=40 nodelay;
            proxy_pass      http://backend_upstream;
        }

        # Schema / docs are part of /api/ but called out so future caching tweaks
        # (e.g. long-cache the schema JSON) have an obvious home.
        location = /api/schema/ {
            proxy_pass      http://backend_upstream;
        }
        location /api/docs/ {
            proxy_pass      http://backend_upstream;
        }

        # ----- Django admin -----
        location /admin/ {
            proxy_pass      http://backend_upstream;
        }

        # ----- Collected static (Django collectstatic output) -----
        location /static/ {
            alias /usr/share/nginx/static/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        # ----- User-uploaded media -----
        location /media/ {
            alias /usr/share/nginx/media/;
            expires 7d;
            access_log off;
            add_header Cache-Control "public";
        }

        # ----- React SPA -----
        # try_files falls back to index.html so React Router can own the URL space.
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
        }

        # Cache-bust hashed Vite assets aggressively.
        location ~* ^/assets/.*\.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
            root /usr/share/nginx/html;
            expires 1y;
            access_log off;
            add_header Cache-Control "public, immutable";
        }
    }
}
