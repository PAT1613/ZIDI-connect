version: "3.9"

# Production compose. Run with:
#   docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16-alpine
    container_name: zidi_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: zidi_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zidi_backend
    restart: always
    env_file:
      - .env
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "/app/entrypoint.sh &&
             gunicorn zidi_connect.wsgi:application
             --bind 0.0.0.0:8000
             --workers 4
             --threads 2
             --timeout 60
             --access-logfile -
             --error-logfile -"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zidi_celery_worker
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    command: celery -A zidi_connect worker --loglevel=info --concurrency=4

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zidi_celery_beat
    restart: always
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    command: celery -A zidi_connect beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: zidi_frontend
    restart: always
    volumes:
      - frontend_dist:/usr/share/nginx/html

  nginx:
    image: nginx:1.27-alpine
    container_name: zidi_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - static_data:/usr/share/nginx/static:ro
      - media_data:/usr/share/nginx/media:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend

volumes:
  pg_data:
  media_data:
  static_data:
  frontend_dist:
